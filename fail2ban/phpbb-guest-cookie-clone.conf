# Fail2Ban filter - guest visitor-cookie clone multi-IP signal
# Source log: /var/log/security_audit.log

[Definition]

failregex = ^.*PHPBB-SIGNAL ip=<HOST> session=\S+ user_id=\d+ signals="(?:[^"]*,)?(?:guest_cookie_clone_multi_ip|guest_cookie_ajax_fail)(?:,[^"]*)?".*$
ignoreregex =

[Init]

datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S
